<!DOCTYPE html>
<html lang ="en">
<head>
    <meta charset ="UTF-8">
    <meta name ="viewport" content="width=device-width, initial-scale=1.0">
    <tite>Doughnut page</tite>
    <style>
       body {
           margin: 0;
           padding: 0;
           background: #964B00;
           font-family: Arial, Helvetica, sans-serif;
           color: #3d2314;
           display: flex;
           flex-direction: column;
           align-items: center;
       }    
       .header-logo {
           text-align: center;
           padding: 30px 0px 5px 0px;
       }
       .header-logo img {
           max-width: 500px;
           height: auto;
       }
       .container {
           display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 1200px;
            padding: 15px;
            gap: 35px;
       }
        .menu-area {
            display: flex;
            flex-direction: row;
            gap: 15px;
            width: 100%;
            overflow-x: scroll;
            padding-bottom: 20px;     
        }
        .menu-card {
            background: #ffffff;
            text-align: center;
            min-width: 230px;
            padding: 15px;
        }     
        .menu-card h3 {
            font-size: 1.25rem;
            margin: 0 0 10px 0;
            color: #3d2314;
        }
        .menu-card img {
            width: 100%;
            max-width: 220px;
            height: auto;
            object-fit: cover;
            margin-bottom: 8px;
        }
        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 4px;
        }
        .price-tag {
            font-weight: bold;
            font-size: 1.05rem;
        }
        .add-btn {
            background-color: #ffffff;
            border: 1px solid #3d2314;
            padding: 5px 12px;
            font-size: 0.8rem;
            cursor: pointer;
            color: #3d2314;
        }
        .add-btn:hover {
            background: #3d2314;
            color: #ffffff;
        }
        .order-sidebar {
            width: 100%;
            max-width: 4000px;
            background: #ffffff;
            border: 2px solid #3d2314;
            text-align: center;
            padding: 25px 15px;
        }
        .sidebar-title {
            font-size: 1.35rem;
            font-weight: bold;
            margin: 0 0 15px 0;
            color: #3d2314;
        }
        .cart-items-list {
            padding: 0;
            min-height: 60px;
            max-height: 180px;
            overflow-y: auto;
            margin: 0 0 15px 0;
            list-style: none;
        }
        .cart-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 0.9rem;
        }
        .form-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .form-group {
            display: flex;
            align-items: center;
        }
        .form-group label {
            font-weight: bold;
            font-size: 0.85rem;
            width: 60px;
            text-align: left;
        }
        .form-group input {
            flex: 1;
            padding: 10px 12px;
            border: 2px solid #7a7a7a;
            border-radius: 4px;
            background: #ffffff;
            color: #3d2314;
            font-size: 16px;
            box-sizing: border-box;
        }
        .form-group input:focus {
            outline: 2px solid #0b63d1;
            outline-offset: 0;
            border-color: #0b63d1;
        }
        .form-actions {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        .add-btn,
        .action-btn {
            background: #f0f0f0;
            border: 2px solid #7a7a7a;
            border-radius: 4px;
            color: #000;
            padding: 8px 16px;
            font-size: 16px;
            font-family: Arial, Helvetica, sans-serif;
            cursor: pointer;
        }
        .add-btn:hover,
        .action-btn:hover {
            background: #e6e6e6;
        }
         .add-btn:active,
         .action-btn:active {
            background: #dcdcdc;
            border-color: #5f5f5f;
        }

    </style>
</head>
<body>
    <div class="header-logo">
        <img src="Doughlectable.png" alt="Shop Logo">
    </div>
    <div class="container">
        <div class="menu-area">
            <div class="menu-card">
                <h3>Glazed Doughnut</h3>
                <img src="glazed_doughnut.jpg" alt="Glazed">
                <div class="card-footer">
                    <span class="price-tag">$4.50</span>
                    <button class="add-btn" onclick="grabItem('Glazed Doughnut', 4.50)">Add to order</button>
                </div>
            </div>
            <div class="menu-card">
                <h3>Choco Fill Doughnut</h3>
                <img src="choc_fill_doughnut.jpg" alt="Choc Fill">
                <div class="card-footer">
                    <span class="price-tag">$5.50</span>
                    <button class="add-btn" onclick="grabItem('Choc Fill Donut', 5.50)">Add to order</button>
             </div>
             </div>
             <div class="menu-card">
                 <h3>Vanilla Custard Doughnut</h3>
                 <img src="vanilla_custard.png" alt="Boston Cream">
                 <div class="card-footer">
                     <span class="price-tag">$6.00</span>
                     <button class="add-btn" onclick="grabItem('Boston Cream', 6.00)">Add to order</button>
                     
             </div>
             </div>
             <div class="menu-card">
                 <h3>Country Doughnut</h3>
                 <img src="Israel.png" alt="Country Doughnut">
                 <div class="card-footer">
                     <span class="price-tag">$5.50</span>
                     <button class="add-btn" onclick="grabItem('Country Doughnut', 5.50)">Add to order</button>
            </div>
            </div>
        </div>
        <div class="order-sidebar">
            <h2 class="sidebar-title">Order</h2>
            <ul class="cart-items-list" id="displayBox"></ul>
            <form class="form-container" id="checkoutForm" onsubmit="sendOrder(event)">
                <div class="form-group">
                    <label for="custName">Name :</label>
                    <input type="text" id="custName" required>
                </div>
                 <div class="form-group">
                    <label for="custMoney">Money:</label>
                    <input type="text" id="custMoney" readonly placeholder="$0.00">
                </div>
                <div class="form-actions">
                    <button type="button" class="action-btn" onclick="runTotal()"> Price</button>
                    <button type="button" class="action-btn" onclick="clearCart()">Reset</button>
                    <button type="submit" class="action-btn">Submit</button>
                </div>
            </form>

            <div class="receipt-container" id="receipt" style="display:none;">
              <h1>Receipt:</h1>

             <h2><strong>Name:</strong> <span id="receiptName"></span></h2>

             <h2><strong>Money:</strong> $<span id="receiptMoney"></span></h2>

             <h2><strong>Total Order Cost:</strong> $<span id="receiptTotal"></span></h2>

             <h2><strong>Change:</strong> $<span id="receiptChange"></span></h2>

             <h2>Items Ordered:</h2>

            <div id="receiptItems"></div>

        </div>
        </div>
    </div>
    <script>
        let my_donuts = [];
        let till_total = 0;

        const visualList = document.getElementById('displayBox');
        const cashField = document.getElementById('custMoney');

        function grabItem(chosenName, itemCost) {
            let found = false;
            for (let i = 0; i < my_donuts.length; i++) {
                if (my_donuts[i].title === chosenName) {
                    my_donuts[i].amount = my_donuts[i].amount + 1;
                    found = true;
                }
            }
            if (found === false) {
                let newItem = { 
                    title: chosenName, 
                    cost: itemCost, 
                    amount: 1 
                };
                my_donuts.push(newItem);
            }
            updateCartDisplay();
        }

        function updateCartDisplay() {
            visualList.innerHTML = '';
            till_total = 0;
            
            if (my_donuts.length === 0) {
                visualList.innerHTML = '<li style="text-align:center; color:#888;">Empty Cart</li>';
            } else {
                for (let j = 0; j < my_donuts.length; j++) {
                    let item = my_donuts[j];
                    let lineCost = item.cost * item.amount;
                    till_total = till_total + lineCost;

                     const row = document.createElement('li');
                    row.className = 'cart-item';
                    row.innerHTML = '<span>' + item.title + ' (x' + item.amount + ')</span><span>$' + lineCost.toFixed(2) + '</span>';
                    visualList.appendChild(row);
                }
            }
        }

         function runTotal() {
            cashField.value = '$' + till_total.toFixed(2);
        }

        function clearCart() {
            my_donuts = [];
            document.getElementById('custName').value = '';
            cashField.value = '';
            updateCartDisplay();
        }

         function sendOrder(e) {
            e.preventDefault();
            alert('Order submitted successfully!');
            clearCart();
        }
    </script>
</body>
</html>
