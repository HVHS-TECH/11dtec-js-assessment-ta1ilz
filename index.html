<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Vikum's Doughnut Haven</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
   
    @font-face {
      font-family: "MyFont";
      src: url("sansation_light.woff");
    }

    body {
      margin: 0;
      font-family: "MyFont", Arial, sans-serif;
      background-color: #2b1810; 
      color: #f9f3eb; 
    }

   
    .topbar {
       background-color: #1c0f0a; 
      padding: 15px;
      text-align: center;
      border-bottom: 1px solid #ebdcb9; 
    }

    .topbar a {
      color: #f9f3eb;
      margin: 0 10px;
      text-decoration: none;
      font-weight: bold;
      transition: color 0.3s ease;
    }

    .topbar a:hover {
      color: #ebdcb9; 
    }

    .topbar form {
      margin-top: 10px;
    }

    .topbar input[type="text"] {
      padding: 8px;
      width: 200px;
      background-color: #3d251a;
      border: 1px solid #ebdcb9;
      color: #f9f3eb;
      border-radius: 4px;
    }

    .topbar input[type="submit"] {
      padding: 8px 12px;
      background-color: #5c3a21;
      border: 1px solid #ebdcb9;
      color: #f9f3eb;
      cursor: pointer;
      border-radius: 4px;
      font-weight: bold;
    }

    .topbar input[type="submit"]:hover {
      background-color: #7a4f31;
    }

    .content {
      text-align: center;
      padding: 20px;
      max-width: 800px;
      margin: 0 auto;
    }

    h1, h2 {
      color: #ebdcb9; 
    }

    .doughnuts {
      margin-top: 20px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
    }

    .doughnuts div {
      width: 220px;
      padding: 15px;
      background-color: #3d251a; 
      border: 1px solid #5c3a21;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
      font-weight: bold;
      transition: transform 0.2s ease;
    }

    .doughnuts div:hover {
      transform: translateY(-3px);
      border-color: #ebdcb9;
    }

    img {
      margin: 20px 10px;
      border: 3px solid #5c3a21;
      border-radius: 12px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.5);
    }

    .links a {
      display: inline-block;
      margin: 10px;
      padding: 10px 16px;
      background-color: #5c3a21;
      border: 1px solid #ebdcb9;
      color: #f9f3eb;
      text-decoration: none;
      border-radius: 6px;
      font-weight: bold;
      transition: background-color 0.2s ease;
    }

    .links a:hover {
      background-color: #ebdcb9;
      color: #2b1810;
    }

    .footer {
      margin-top: 40px;
      padding: 20px;
      text-align: center;
      background-color: #1c0f0a;
      border-top: 1px solid #ebdcb9;
    }
  </style>
</head>

<body>

  <div class="topbar">
    <nav>
      <a href="#Menu">Menu</a>
      <a href="#Order">Order</a>
    </nav>

    <form action="https://www.google.com/search" method="get" target="_blank">
      <input type="text" name="q" placeholder="Doughnut finder 2.0">
      <input type="submit" value="Search">
    </form>
  </div>

  <div class="content">
    
    <img src="Doughlectable.png" alt="Doughlectable sign reading Doughlectable in stylized lettering on a warm brown background suggesting a cozy doughnut shop" width="600" height="200">

    <h1>Doughnut Haven</h1>
    <p>This page is about delicious doughnuts and some of the finest treats in the world.</p>

    <h2>Top Doughnuts</h2>

    <div class="doughnuts">
      <div>Chocolate Glazed</div>
      <div>Vanilla Custard</div>
      <div>Maple Bacon</div>
      <div>Boston Cream</div>
      <div>Red Velvet</div>
      <div>Cinnamon Twist</div>
    </div>

 <img src="chocolate_glazed.jpg" alt="Chocolate Glazed Doughnut" width="330" height="240">
 <img src="vanilla_custard.jpg" alt="Vanilla Custard Doughnut" width="330" height="240">

    <div class="links">
      <a href="https://wikipedia.org" target="_blank">Doughnuts</a>
      <a href="https://wikipedia.org" target="_blank">Doughnuts</a>
    </div>

    <h2>About</h2>
    <p>I made this page because I like doughnuts.</p>

   
    <div class="footer">
    <p>©Vikum</p>
  </div>

</body>
</html>
