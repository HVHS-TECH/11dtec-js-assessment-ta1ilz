<!DOCTYPE html>
<html lang ="en">
<head>
    <meta charset ="UTF-8">
    <meta name ="viewport" content="width=device-width, initial-scale=1.0">
    <tite>Doughnut page</tite>
    <style>
       body {
           margin: 0;
           padding: 0;
           background: #ffffff;
           font-family: Arial, Helvetica, sans-serif;
           color: #3d2314;
           display: flex;
           flex-direction: column;
           align-items: center;
       }    
       .header-logo {
           text-align: center;
           padding: 30px 0px 5px 0px;
       }
       .header-logo img {
           max-width: 170px;
           height: auto;
       }
       .container {
           display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 1200px;
            padding: 15px;
            gap: 35px;
       }
        .menu-area {
            display: flex;
            flex-direction: row;
            gap: 15px;
            width: 100%;
            overflow-x: scroll;
            padding-bottom: 20px;     
        }
        .menu-card {
            background: #ffffff;
            text-align: center;
            min-width: 230px;
            padding: 15px;
        }     
        .menu-card h3 {
            font-size: 1.25rem;
            margin: 0 0 10px 0;
            color: #3d2314;
        }
        .menu-card img {
            width: 100%;
            max-width: 220px;
            height: auto;
            object-fit: cover;
            margin-bottom: 8px;
        }
        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 4px;
        }
        .price-tag {
            font-weight: bold;
            font-size: 1.05rem;
        }
        .add-btn {
            background-color: #ffffff;
            border: 1px solid #3d2314;
            padding: 5px 12px;
            font-size: 0.8rem;
            cursor: pointer;
            color: #3d2314;
        }
        .add-btn:hover {
            background: #3d2314;
            color: #ffffff;
        }
        .order-sidebar {
            width: 100%;
            max-width: 4000px;
            background: #ffffff;
            border: 2px solid #3d2314;
            text-align: center;
            padding: 25px 15px;
        }
        .sidebar-title {
            font-size: 1.35rem;
            font-weight: bold;
            margin: 0 0 15px 0;
            color: #3d2314;
        }
        .cart-items-list {
            padding: 0;
            min-height: 60px;
            max-height: 180px;
            overflow-y: auto;
            margin: 0 0 15px 0;
            list-style: none;
        }
        .cart-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 0.9rem;
        }
        .form-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .form-group {
            display: flex;
            align-items: center;
        }
        .form-group label {
            font-weight: bold;
            font-size: 0.85rem;
            width: 60px;
            text-align: left;
        }
        .form-group input {
            flex: 1;
            padding: 10px 12px;
            border: 2px solid #7a7a7a;
            border-radius: 4px;
            background: #ffffff;
            color: #3d2314;
            font-size: 16px;
            box-sizing: border-box;
        }
        .form-group input:focus {
            outline: 2px solid #0b63d1;
            outline-offset: 0;
            border-color: #0b63d1;
        }
        .form-actions {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        .add-btn,
        .action-btn {
            background: #f0f0f0;
            border: 2px solid #7a7a7a;
            border-radius: 4px;
            color: #000;
            padding: 8px 16px;
            font-size: 16px;
            font-family: Arial, Helvetica, sans-serif;
            cursor: pointer;
        }
        .add-btn:hover,
        .action-btn:hover {
            background: #e6e6e6;
        }
         .add-btn:active,
         .action-btn:active {
            background: #dcdcdc;
            border-color: #5f5f5f;
        }
